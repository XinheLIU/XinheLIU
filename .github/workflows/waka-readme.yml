name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with WakaTime metrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          TIME_RANGE: last_30_days
          SHOW_TITLE: false
          SHOW_TIME: true
          SHOW_TOTAL: true
          LANG_COUNT: 5
          CODE_LANG: text
          BLOCKS: "░▒▓█"
